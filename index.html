<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/ngo-dinh-cuong.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Apply saved theme before paint to avoid a flash (default: dark) -->
    <script>
      (function () {
        try {
          var q = new URLSearchParams(location.search).get('theme')
          if (q === 'light' || q === 'dark') {
            try {
              localStorage.setItem('theme', q)
            } catch (e) {}
          }
          var t = q || localStorage.getItem('theme') || 'dark'
          var el = document.documentElement
          el.classList.toggle('dark', t === 'dark')
          el.classList.toggle('light', t === 'light')
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <meta
      name="description"
      content="Cuong Ngo — Full Stack Developer. 10+ years of PHP (Laravel/Symfony), now building modern web apps with Vue, Nuxt and React."
    />
    <title>Cuong Ngo — Full Stack Developer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!-- Single-page-app redirect restore for GitHub Pages (pairs with public/404.html) -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
